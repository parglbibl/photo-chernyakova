    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1
            });
            document.querySelectorAll('.section, .gallery').forEach(function(el) {
                el.classList.add('fade-up');
                observer.observe(el);
            });
        });
    </script>

    <script>
    (function() {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initNatureGallery);
        } else {
            initNatureGallery();
        }

        function initNatureGallery() {
            var items = document.querySelectorAll('.gallery-item');
            if (items.length === 0) return;

            var overlay = document.querySelector('.lightbox-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'lightbox-overlay';
                overlay.innerHTML = `
                    <div class="lightbox-content">
                        <span class="close-btn">&times;</span>
                        <div class="lightbox-image-wrapper">
                            <img src="" alt="" />
                        </div>
                        <div class="caption"></div>
                        <div class="lightbox-nav">
                            <button class="nav-btn prev-btn">‹</button>
                            <span class="counter">1 / 5</span>
                            <button class="nav-btn next-btn">›</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
            }

            var lightboxImg = overlay.querySelector('img');
            var captionEl = overlay.querySelector('.caption');
            var closeBtn = overlay.querySelector('.close-btn');
            var prevBtn = overlay.querySelector('.prev-btn');
            var nextBtn = overlay.querySelector('.next-btn');
            var counter = overlay.querySelector('.counter');

            var imageItems = [];
            items.forEach(function(item) {
                var img = item.querySelector('img');
                if (img && img.src) {
                    imageItems.push({
                        src: img.src,
                        caption: ''
                    });
                }
            });

            var currentIndex = 0;
            var currentScale = 1;
            var minScale = 1;
            var maxScale = 5;

            function openLightbox(index) {
                if (imageItems.length === 0) return;
                if (index < 0) index = imageItems.length - 1;
                if (index >= imageItems.length) index = 0;
                currentIndex = index;
                
                var item = imageItems[currentIndex];
                lightboxImg.src = item.src;
                captionEl.textContent = '';
                counter.textContent = (currentIndex + 1) + ' / ' + imageItems.length;
                
                currentScale = 1;
                lightboxImg.style.transform = 'scale(1)';
                lightboxImg.style.cursor = 'zoom-in';
                
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            items.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    var img = this.querySelector('img');
                    if (img && img.src) {
                        for (var j = 0; j < imageItems.length; j++) {
                            if (imageItems[j].src === img.src) {
                                openLightbox(j);
                                break;
                            }
                        }
                    }
                });
            });

            prevBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                openLightbox(currentIndex - 1);
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                openLightbox(currentIndex + 1);
            });

            closeBtn.addEventListener('click', closeLightbox);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeLightbox();
            });

            document.addEventListener('keydown', function(e) {
                if (!overlay.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') openLightbox(currentIndex - 1);
                if (e.key === 'ArrowRight') openLightbox(currentIndex + 1);
            });

            lightboxImg.addEventListener('wheel', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var delta = e.deltaY > 0 ? -0.1 : 0.1;
                currentScale = Math.min(maxScale, Math.max(minScale, currentScale + delta));
                this.style.transform = 'scale(' + currentScale + ')';
                this.style.cursor = currentScale > 1 ? 'zoom-out' : 'zoom-in';
            }, { passive: false });

            lightboxImg.addEventListener('dblclick', function() {
                currentScale = 1;
                this.style.transform = 'scale(1)';
                this.style.cursor = 'zoom-in';
            });

            var touchStartX = 0;
            var lastTouchDistance = 0;
            var touchStartScale = 1;

            overlay.addEventListener('touchstart', function(e) {
                var target = e.target;
                if (target === overlay || target === lightboxImg || target.closest('.lightbox-image-wrapper')) {
                    if (e.touches.length === 1) {
                        touchStartX = e.touches[0].clientX;
                    }
                    if (e.touches.length === 2) {
                        var t1 = e.touches[0];
                        var t2 = e.touches[1];
                        lastTouchDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        touchStartScale = currentScale;
                    }
                }
            }, { passive: true });

            overlay.addEventListener('touchmove', function(e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    var t1 = e.touches[0];
                    var t2 = e.touches[1];
                    var distance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                    if (lastTouchDistance > 0) {
                        var scaleChange = distance / lastTouchDistance;
                        currentScale = Math.min(maxScale, Math.max(minScale, touchStartScale * scaleChange));
                        lightboxImg.style.transform = 'scale(' + currentScale + ')';
                    }
                }
            }, { passive: false });

            overlay.addEventListener('touchend', function(e) {
                if (currentScale > 1) {
                    touchStartX = 0;
                    return;
                }
                if (touchStartX === 0) return;
                
                var touchEndX = e.changedTouches[0].clientX;
                var diffX = touchStartX - touchEndX;
                
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        openLightbox(currentIndex + 1);
                    } else {
                        openLightbox(currentIndex - 1);
                    }
                }
                touchStartX = 0;
            }, { passive: true });
        }
    })();
    </script>
